<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phishing URL Detector</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            width: 400px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #2c5364;
        }

        p {
            color: #555;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #2c5364;
            box-shadow: 0 0 5px #2c5364;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2c5364;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #203a43;
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            font-size: 16px;
            font-weight: bold;
        }

        .safe {
            color: green;
        }

        .phishing {
            color: red;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔐 Phishing URL Detector</h1>
        <p>Enter a website URL to check if it is safe or phishing.</p>

        <form method="POST">
            <input type="text" name="url" placeholder="Enter URL here..." required>
            <button type="submit">Check Website</button>
        </form>

        {% if prediction %}
            <div class="result 
                {% if prediction == 'Legitimate Website' %}
                    safe
                {% else %}
                    phishing
                {% endif %}
            ">
                {{ prediction }}
            </div>
        {% endif %}

        <footer>
            Machine Learning Based Security System
        </footer>
    </div>

</body>
</html>
